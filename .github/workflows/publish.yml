name: Publish to npm

on:
  push:
    branches:
      - master

permissions:
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check commit message for release trigger
        id: check
        # Pass the commit message via env, never interpolate it into the script.
        # Inlining ${{ github.event.head_commit.message }} lets quotes/backticks
        # in the message break the shell (and is a command-injection vector).
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # Only the first line (subject) is the release trigger.
          SUBJECT=$(printf '%s\n' "$COMMIT_MSG" | head -n1)
          if printf '%s' "$SUBJECT" | grep -qE '^release: [0-9]+\.[0-9]+\.[0-9]+'; then
            VERSION=$(printf '%s' "$SUBJECT" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+[^ ]*' | head -n1)
            echo "triggered=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            if printf '%s' "$VERSION" | grep -qE '-'; then
              echo "tag=next" >> "$GITHUB_OUTPUT"
            else
              echo "tag=latest" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "triggered=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify package.json version matches commit message
        if: steps.check.outputs.triggered == 'true'
        env:
          MSG_VERSION: ${{ steps.check.outputs.version }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$PKG_VERSION" != "$MSG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match commit message version ($MSG_VERSION)"
            exit 1
          fi
          echo "Version $PKG_VERSION confirmed"

      - uses: actions/setup-node@v4
        if: steps.check.outputs.triggered == 'true'
        with:
          node-version: "20"

      - run: npm install -g npm@latest
        if: steps.check.outputs.triggered == 'true'

      - run: npm install
        if: steps.check.outputs.triggered == 'true'

      - run: npm test
        if: steps.check.outputs.triggered == 'true'

      - run: npm run build
        if: steps.check.outputs.triggered == 'true'

      - run: npm publish --provenance --tag ${{ steps.check.outputs.tag }}
        if: steps.check.outputs.triggered == 'true'
